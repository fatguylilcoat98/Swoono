<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0a26"/>
      <stop offset="100%" stop-color="#0a0614"/>
    </radialGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d8f"/>
      <stop offset="100%" stop-color="#ff7ab3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(256 256)">
    <!-- Swoono heart wordmark: stylized S with a heart as the last letter -->
    <text x="0" y="12"
          text-anchor="middle"
          font-family="'Playfair Display', Georgia, serif"
          font-size="240"
          font-weight="700"
          font-style="italic"
          fill="#f8e6f0">S</text>
    <path d="M 70 -60
             C 90 -100, 140 -100, 140 -55
             C 140 -30, 115 -5, 70 40
             C 25 -5, 0 -30, 0 -55
             C 0 -100, 50 -100, 70 -60 Z"
          fill="url(#heart)"
          transform="translate(0 20) scale(0.9)"/>
  </g>
</svg>
